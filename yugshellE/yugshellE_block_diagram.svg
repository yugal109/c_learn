<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="920" viewBox="0 0 1520 920">
  <defs>
    <style>
      .title { font: 700 32px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 13px Arial, sans-serif; fill: #1e293b; }
      .small-text { font: 500 12px Arial, sans-serif; fill: #475569; }
      .arrow-label { font: 600 12px Arial, sans-serif; fill: #334155; }
      .file-label { font: 600 12px Arial, sans-serif; fill: #1d4ed8; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1520" height="920" fill="#f8fafc"/>

  <text x="48" y="56" class="title">yugshellE — runtime flow</text>
  <text x="48" y="82" class="subtitle">Redirection via dup2 before execvp · Builtins (incl. history) only on non-pipeline path · Max one pipe</text>

  <!-- 1 Main -->
  <rect x="48" y="108" rx="12" ry="12" width="400" height="200" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="68" y="140" class="box-title">1 · Main loop</text>
  <text x="68" y="166" class="box-text">prompt → read_line() → empty? break</text>
  <text x="68" y="190" class="box-text">history_add(line), max 100</text>
  <text x="68" y="214" class="box-text">parse_pipeline(line) → execute / execute_pipeline</text>
  <text x="68" y="246" class="file-label">main.c · history.c</text>

  <!-- 2 Input -->
  <rect x="488" y="108" rx="12" ry="12" width="320" height="200" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="508" y="140" class="box-title">2 · Input</text>
  <text x="508" y="166" class="box-text">getchar loop, realloc buffer → line*</text>
  <text x="508" y="246" class="file-label">input.c</text>

  <!-- 3 Parser -->
  <rect x="848" y="108" rx="12" ry="12" width="624" height="200" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="868" y="140" class="box-title">3 · Parser</text>
  <text x="868" y="166" class="box-text">First '|' → split left | right; else single command</text>
  <text x="868" y="190" class="box-text">parse_line: tokens + &lt; &gt; &gt;&gt; → Command</text>
  <text x="868" y="246" class="file-label">parser.c · command.h</text>

  <!-- Diamond -->
  <polygon points="760,360 880,420 760,480 640,420" fill="#fee2e2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="708" y="418" class="box-title">pipe?</text>
  <text x="692" y="438" class="small-text">has_pipe</text>

  <!-- 4A execute -->
  <rect x="48" y="520" rx="12" ry="12" width="560" height="248" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2" filter="url(#shadow)"/>
  <text x="68" y="552" class="box-title">4A · execute(left)</text>
  <text x="68" y="578" class="box-text">No args → return 1</text>
  <text x="68" y="602" class="box-text">Builtin → cd / help / exit / history</text>
  <text x="68" y="626" class="box-text">Else fork · child: setup_redirection() · execvp</text>
  <text x="68" y="650" class="box-text">Parent waitpid; exit builtin → status 0 ends loop</text>
  <text x="68" y="682" class="small-text">setup_redirection: open + dup2 stdin/stdout</text>
  <text x="68" y="714" class="file-label">executor.c · builtins.c</text>

  <!-- 4B pipeline -->
  <rect x="648" y="520" rx="12" ry="12" width="824" height="288" fill="#cffafe" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <text x="668" y="552" class="box-title">4B · execute_pipeline()</text>
  <text x="668" y="578" class="box-text">pipe() · fork left: dup2 write end → STDOUT, setup_redirection, execvp</text>
  <text x="668" y="602" class="box-text">fork right: dup2 read end → STDIN, setup_redirection, execvp</text>
  <text x="668" y="626" class="box-text">Parent closes fds · wait both · return 1</text>
  <text x="668" y="746" class="file-label">executor.c</text>

  <!-- Top row flow -->
  <line x1="448" y1="208" x2="488" y2="208" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="808" y1="208" x2="848" y2="208" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Parser → diamond (clear elbow, no legend in the way) -->
  <path d="M 1160 308 L 1160 340 L 760 340 L 760 360" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Diamond → 4A / 4B -->
  <path d="M 640 420 L 328 420 L 328 520" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="340" y="412" class="arrow-label">no</text>

  <path d="M 880 420 L 1060 420 L 1060 520" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="900" y="412" class="arrow-label">yes</text>

  <!-- Return: non-pipe — left gutter only -->
  <path d="M 328 768 L 328 820 L 24 820 L 24 208 L 48 208" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrow-loop)"/>
  <text x="32" y="800" class="arrow-label">loop</text>

  <!-- Return: pipe — right edge then across top (no overlap with left loop path) -->
  <path d="M 1060 808 L 1060 860 L 1496 860 L 1496 48 L 448 48 L 448 108" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrow-loop)"/>
  <text x="1380" y="852" class="arrow-label">loop</text>
</svg>
