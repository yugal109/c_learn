<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #334155; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 14px Arial, sans-serif; fill: #1e293b; }
      .small-text { font: 500 13px Arial, sans-serif; fill: #334155; }
      .arrow-label { font: 700 13px Arial, sans-serif; fill: #0f172a; }
      .file-label { font: 600 13px Arial, sans-serif; fill: #1d4ed8; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1500" height="980" fill="#f8fafc"/>

  <text x="60" y="64" class="title">yugshellE Runtime Block Diagram</text>
  <text x="60" y="94" class="subtitle">Single command + redirection + single pipeline execution flow</text>

  <!-- main loop -->
  <rect x="70" y="145" rx="14" ry="14" width="430" height="185" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="94" y="180" class="box-title">1) Main Loop</text>
  <text x="94" y="208" class="box-text">Print prompt: yugshell&gt;:</text>
  <text x="94" y="232" class="box-text">line = read_line()</text>
  <text x="94" y="256" class="box-text">If line is NULL/empty: break loop</text>
  <text x="94" y="280" class="box-text">pipeline = parse_pipeline(line)</text>
  <text x="94" y="304" class="file-label">main.c</text>

  <!-- input -->
  <rect x="560" y="145" rx="14" ry="14" width="360" height="165" fill="#dcfce7" stroke="#15803d" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="584" y="180" class="box-title">2) Input Reader</text>
  <text x="584" y="208" class="box-text">getchar() loop until newline/EOF</text>
  <text x="584" y="232" class="box-text">Grow buffer with realloc()</text>
  <text x="584" y="256" class="box-text">Null-terminate and return line*</text>
  <text x="584" y="280" class="file-label">input.c - read_line()</text>

  <!-- parser -->
  <rect x="980" y="145" rx="14" ry="14" width="450" height="220" fill="#fef3c7" stroke="#b45309" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="1004" y="180" class="box-title">3) Parser: Pipeline + Redirection</text>
  <text x="1004" y="208" class="box-text">Check first '|' with strchr()</text>
  <text x="1004" y="232" class="box-text">No pipe: has_pipe=0, parse only left command</text>
  <text x="1004" y="256" class="box-text">Pipe found: split line, parse left + right command</text>
  <text x="1004" y="280" class="box-text">parse_line() handles: &lt;, &gt;, &gt;&gt;</text>
  <text x="1004" y="304" class="box-text">Stores input_file/output_file/append in Command</text>
  <text x="1004" y="328" class="file-label">parser.c, parser.h, command.h</text>

  <!-- pipeline decision -->
  <polygon points="760,405 910,475 760,545 610,475" fill="#fee2e2" stroke="#b91c1c" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="700" y="474" class="box-title">has_pipe?</text>
  <text x="673" y="497" class="small-text">pipeline-&gt;has_pipe</text>

  <!-- non-pipe execute -->
  <rect x="90" y="595" rx="14" ry="14" width="620" height="270" fill="#e0e7ff" stroke="#4338ca" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="114" y="630" class="box-title">4A) Non-Pipeline Path: execute(left)</text>
  <text x="114" y="658" class="box-text">If cmd->args[0] == NULL -&gt; return 1</text>
  <text x="114" y="682" class="box-text">If builtin -&gt; run_builtin(cmd->args)</text>
  <text x="114" y="706" class="box-text">Else fork child</text>
  <text x="114" y="730" class="box-text">Child: setup_redirection(cmd), then execvp()</text>
  <text x="114" y="754" class="box-text">Parent: waitpid(child, &amp;status, 0)</text>
  <text x="114" y="778" class="box-text">Return 1 (continue), except builtin exit returns 0</text>
  <text x="114" y="802" class="file-label">executor.c - execute(), setup_redirection()</text>

  <!-- builtins detail -->
  <rect x="90" y="880" rx="10" ry="10" width="620" height="70" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.8"/>
  <text x="112" y="908" class="small-text">Builtins: cd (chdir), help (print usage), exit (return 0)</text>
  <text x="112" y="930" class="file-label">builtins.c</text>

  <!-- pipeline execute -->
  <rect x="800" y="595" rx="14" ry="14" width="620" height="320" fill="#cffafe" stroke="#0e7490" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="824" y="630" class="box-title">4B) Pipeline Path: execute_pipeline()</text>
  <text x="824" y="658" class="box-text">Create pipe(pipefd)</text>
  <text x="824" y="682" class="box-text">Fork child #1 (left command)</text>
  <text x="824" y="706" class="box-text">- dup2(pipefd[1], STDOUT)</text>
  <text x="824" y="730" class="box-text">- setup_redirection(left), execvp(left->args[0], left->args)</text>
  <text x="824" y="754" class="box-text">Fork child #2 (right command)</text>
  <text x="824" y="778" class="box-text">- dup2(pipefd[0], STDIN)</text>
  <text x="824" y="802" class="box-text">- setup_redirection(right), execvp(right->args[0], right->args)</text>
  <text x="824" y="826" class="box-text">Parent closes pipe ends, waitpid(pid1), waitpid(pid2)</text>
  <text x="824" y="850" class="box-text">Returns 1</text>
  <text x="824" y="874" class="file-label">executor.c - execute_pipeline()</text>

  <!-- redirection helper -->
  <rect x="1160" y="390" rx="12" ry="12" width="270" height="160" fill="#ffffff" stroke="#64748b" stroke-width="1.8"/>
  <text x="1178" y="419" class="box-title">setup_redirection()</text>
  <text x="1178" y="444" class="small-text">input_file -&gt; open O_RDONLY</text>
  <text x="1178" y="468" class="small-text">dup2(fd, STDIN), close(fd)</text>
  <text x="1178" y="492" class="small-text">output_file -&gt; O_WRONLY|O_CREAT</text>
  <text x="1178" y="516" class="small-text">append? O_APPEND : O_TRUNC</text>
  <text x="1178" y="540" class="small-text">dup2(fd, STDOUT), close(fd)</text>

  <!-- arrows -->
  <line x1="500" y1="228" x2="560" y2="228" stroke="#0f172a" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="920" y1="228" x2="980" y2="228" stroke="#0f172a" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M 1205 365 L 1205 390" fill="none" stroke="#0f172a" stroke-width="2.4" marker-end="url(#arrow)"/>

  <path d="M 980 300 L 980 380 L 760 380 L 760 405" fill="none" stroke="#0f172a" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="870" y="368" class="arrow-label">pipeline parsed</text>

  <path d="M 610 475 L 400 475 L 400 595" fill="none" stroke="#0f172a" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="515" y="462" class="arrow-label">NO</text>

  <path d="M 910 475 L 1110 475 L 1110 595" fill="none" stroke="#0f172a" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="930" y="462" class="arrow-label">YES</text>

  <!-- return arrows -->
  <path d="M 400 865 L 400 915 L 70 915 L 70 332 L 250 332" fill="none" stroke="#0f172a" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="78" y="904" class="arrow-label">status back to loop</text>

  <path d="M 1110 915 L 1110 945 L 40 945 L 40 332 L 210 332" fill="none" stroke="#0f172a" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="930" y="938" class="arrow-label">status=1 back to loop</text>

  <!-- legend -->
  <rect x="70" y="350" rx="10" ry="10" width="500" height="190" fill="#ffffff" stroke="#94a3b8" stroke-width="1.8"/>
  <text x="92" y="382" class="box-title">Legend / Important Notes</text>
  <text x="92" y="408" class="small-text">- Parser stores redirection targets in Command struct.</text>
  <text x="92" y="432" class="small-text">- Builtins are handled in execute() (non-pipeline path).</text>
  <text x="92" y="456" class="small-text">- Pipeline children call execvp directly for left and right.</text>
  <text x="92" y="480" class="small-text">- parse_pipeline models one pipe only (left/right).</text>
  <text x="92" y="504" class="small-text">- main loop also exits on empty input line.</text>
</svg>
